services:
  opencode-bridge:
    build: .
    ports:
      - "5000:5000"
    environment:
      - OPENCODE_URL=${OPENCODE_URL:-http://opencode:4096}
      - OPENCODE_SERVER_USERNAME=${OPENCODE_SERVER_USERNAME:-opencode}
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD}
      - OPENCODE_PROVIDER_ID=${OPENCODE_PROVIDER_ID:-github-copilot}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-gpt-4o}
      - OPENCODE_PROXY_API_KEY=${OPENCODE_PROXY_API_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    restart: unless-stopped
    networks:
      - coolify

networks:
  coolify:
    external: true
